services:
  config-server:
    image: fox/config-server
    volumes:
     - ./docker/config-server:/config-server
    container_name: config-server
    environment:
        SPRING_PROFILES_ACTIVE: native
        GIT_REPO: /config-server
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-I", "http://config-server:8888"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
     - "8888:8888"

  discovery-server:
    image: fox/discovery-server
    container_name: discovery-server
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://discovery-server:8761"]
      interval: 5s
      timeout: 3s
      retries: 10
    depends_on:
      config-server:
        condition: service_healthy
    ports:
     - "8761:8761"

  customers-service:
    image: fox/customers-service
    container_name: customers-service
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
    - "8081:8081"

  visits-service:
    image: fox/visits-service
    container_name: visits-service
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - "8082:8082"

  vets-service:
    image: fox/vets-service
    container_name: vets-service
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - "8083:8083"

  genai-service:
    image: fox/genai-service
    container_name: genai-service
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - AZURE_OPENAI_KEY=${AZURE_OPENAI_KEY}
      - AZURE_OPENAI_ENDPOINT=${AZURE_OPENAI_ENDPOINT}
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - "8084:8084"

  api-gateway:
    image: fox/spring-petclinic-api-gateway
    container_name: api-gateway
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - "8080:8080"

  tracing-server:
    image: fox/zipkin
    container_name: tracing-server

    deploy:
      resources:
        limits:
          memory: 512M
    ports:
     - "9411:9411"

  admin-server:
    image: fox/admin-server
    container_name: admin-server
    deploy:
      resources:
        limits:
          memory: 512M
    depends_on:
      config-server:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    ports:
     - "9090:9090"

  ## Grafana / Prometheus

  grafana-server:
    build: ./docker/grafana
    container_name: grafana-server
    image: fox/grafana-server
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
    - "3030:3000"

  prometheus-server:
    build: ./docker/prometheus
    container_name: prometheus-server
    image: fox/prometheus-server
    deploy:
      resources:
        limits:
          memory: 256M
    ports:
    - "9091:9090"

  nginx-proxy:
      build: ./docker/nginx
      image: fox/nginx-proxy
      container_name: nginx-proxy
